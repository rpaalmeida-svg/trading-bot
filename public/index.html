<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Bot — Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    h1 { text-align: center; color: #58a6ff; margin-bottom: 24px; font-size: 1.8rem; }
    .status-bar { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; background: #3fb950; animation: pulse 2s infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px; text-align: center; }
    .card .label { font-size: 0.75rem; color: #8b949e; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
    .card .value { font-size: 1.4rem; font-weight: bold; color: #58a6ff; }
    .card .sub { font-size: 0.75rem; color: #8b949e; margin-top: 4px; }
    .green { color: #3fb950 !important; }
    .red { color: #f85149 !important; }
    .yellow { color: #d29922 !important; }
    .orange { color: #e3832a !important; }
    .section { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
    .section h2 { color: #58a6ff; margin-bottom: 16px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
    .fg-bar-container { position: relative; height: 12px; border-radius: 6px; background: linear-gradient(to right, #f85149, #d29922, #3fb950, #d29922, #f85149); margin-bottom: 8px; }
    .fg-marker { position: absolute; top: -4px; width: 20px; height: 20px; border-radius: 50%; background: #fff; border: 3px solid #58a6ff; transform: translateX(-50%); transition: left 0.5s ease; }
    .fg-labels { display: flex; justify-content: space-between; font-size: 0.7rem; color: #8b949e; }
    .pairs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .pair-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; }
    .pair-card.active { border-color: #58a6ff; }
    .pair-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .pair-name { font-size: 1.1rem; font-weight: bold; color: #e6edf3; }
    .pair-signal { font-size: 0.8rem; font-weight: bold; padding: 4px 10px; border-radius: 8px; background: #21262d; }
    .pair-rows { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .pair-item .plabel { font-size: 0.7rem; color: #8b949e; margin-bottom: 2px; }
    .pair-item .pvalue { font-size: 0.95rem; font-weight: bold; color: #e6edf3; }
    .score-bar { height: 6px; border-radius: 3px; background: #21262d; margin-top: 12px; }
    .score-fill { height: 100%; border-radius: 3px; background: #58a6ff; transition: width 0.5s ease; }
    .position-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .position-item .plabel { font-size: 0.75rem; color: #8b949e; margin-bottom: 4px; }
    .position-item .pvalue { font-size: 1rem; font-weight: bold; }
    .log-box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; }
    .log-box h2 { color: #58a6ff; margin-bottom: 16px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
    #log-list { list-style: none; max-height: 250px; overflow-y: auto; }
    #log-list li { padding: 8px 0; border-bottom: 1px solid #21262d; font-size: 0.82rem; color: #8b949e; }
    #log-list li span { color: #58a6ff; margin-right: 8px; }
    #updated { text-align: center; color: #8b949e; font-size: 0.8rem; margin-top: 20px; }
    .logout { position: fixed; top: 16px; right: 20px; font-size: 0.8rem; color: #8b949e; text-decoration: none; background: #161b22; border: 1px solid #30363d; padding: 6px 14px; border-radius: 8px; }
    .logout:hover { color: #f85149; border-color: #f85149; }
  </style>
</head>
<body>

  <a href="/logout" class="logout">Sair</a>
  <h1>🤖 Trading Bot — Dashboard</h1>

  <div class="status-bar">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">A aguardar dados...</span>
  </div>

  <div class="grid">
    <div class="card">
      <div class="label">Saldo Disponível</div>
      <div class="value green" id="balance">—</div>
    </div>
    <div class="card">
      <div class="label">Preço BTC/USDT</div>
      <div class="value" id="price">—</div>
    </div>
    <div class="card">
      <div class="label">RSI BTC (14)</div>
      <div class="value" id="rsi">—</div>
    </div>
    <div class="card">
      <div class="label">Fear & Greed</div>
      <div class="value" id="fg-value">—</div>
      <div class="sub" id="fg-label">—</div>
    </div>
    <div class="card">
      <div class="label">Posições Abertas</div>
      <div class="value" id="open-positions">—</div>
    </div>
  </div>

  <div class="section">
    <h2>📊 Fear & Greed Index</h2>
    <div class="fg-bar-container">
      <div class="fg-marker" id="fg-marker" style="left:50%"></div>
    </div>
    <div class="fg-labels">
      <span>Medo Extremo</span>
      <span>Medo</span>
      <span>Neutro</span>
      <span>Ganância</span>
      <span>Ganância Extrema</span>
    </div>
  </div>

  <div class="pairs-grid" id="pairs-grid"></div>

  <div class="section" id="position-section">
    <h2>📈 Posições Abertas</h2>
    <div id="no-position" style="color:#8b949e">Sem posições abertas</div>
    <div id="positions-list"></div>
  </div>

  <div class="log-box">
    <h2>📋 Últimos Eventos</h2>
    <ul id="log-list"></ul>
  </div>

  <div id="updated"></div>

  <script>
    const socket = io();
    const logs = [];

    function rsiColor(v) {
      const n = parseFloat(v);
      if (n < 35) return 'green';
      if (n > 65) return 'red';
      return 'yellow';
    }

    function scoreColor(s) {
      if (s >= 75) return '#3fb950';
      if (s >= 55) return '#d29922';
      return '#f85149';
    }

    function fgColor(v) {
      if (v <= 25) return 'green';
      if (v <= 45) return 'yellow';
      if (v <= 55) return 'yellow';
      if (v <= 75) return 'orange';
      return 'red';
    }

    socket.on('update', (data) => {
      document.getElementById('balance').textContent = '$' + data.balance;
      document.getElementById('price').textContent = '$' + data.price;

      const rsiEl = document.getElementById('rsi');
      rsiEl.textContent = data.rsi;
      rsiEl.className = 'value ' + rsiColor(data.rsi);

      const fg = parseInt(data.fearGreed);
      const fgEl = document.getElementById('fg-value');
      fgEl.textContent = fg;
      fgEl.className = 'value ' + fgColor(fg);
      document.getElementById('fg-label').textContent = data.fearGreedLabel || '—';
      document.getElementById('fg-marker').style.left = fg + '%';

      const openCount = data.pairs ? data.pairs.filter(p => p.inPosition).length : 0;
      document.getElementById('open-positions').textContent = openCount + ' / ' + (data.pairs ? data.pairs.length : 3);

      document.getElementById('status-text').textContent = openCount > 0 ? `🔵 ${openCount} posição(ões) abertas` : '🟢 Bot activo — a monitorizar';

      // Pares
      if (data.pairs) {
        const grid = document.getElementById('pairs-grid');
        grid.innerHTML = data.pairs.map(p => `
          <div class="pair-card ${p.inPosition ? 'active' : ''}">
            <div class="pair-header">
              <div class="pair-name">${p.symbol.replace('USDT', '/USDT')}</div>
              <div class="pair-signal ${p.signal === 'BUY' ? 'green' : p.signal === 'SELL' ? 'red' : 'yellow'}">${p.signal || 'WAIT'}</div>
            </div>
            <div class="pair-rows">
              <div class="pair-item">
                <div class="plabel">RSI (14)</div>
                <div class="pvalue ${rsiColor(p.rsi)}">${p.rsi}</div>
              </div>
              <div class="pair-item">
                <div class="plabel">Score</div>
                <div class="pvalue" style="color:${scoreColor(p.score)}">${p.score}/100</div>
              </div>
              <div class="pair-item" style="grid-column: span 2">
                <div class="plabel">Estado</div>
                <div class="pvalue ${p.inPosition ? 'green' : ''}">${p.inPosition ? '🔵 Em posição' : '⚪️ Aguardar'}</div>
              </div>
            </div>
            <div class="score-bar">
              <div class="score-fill" style="width:${p.score}%; background:${scoreColor(p.score)}"></div>
            </div>
          </div>
        `).join('');

        // Posições abertas
        const openPairs = data.pairs.filter(p => p.inPosition);
        const noPos = document.getElementById('no-position');
        const posList = document.getElementById('positions-list');
        if (openPairs.length === 0) {
          noPos.style.display = 'block';
          posList.innerHTML = '';
        } else {
          noPos.style.display = 'none';
          posList.innerHTML = openPairs.map(p => `
            <div style="border-top: 1px solid #30363d; padding-top: 12px; margin-top: 12px;">
              <div style="font-weight:bold; color:#58a6ff; margin-bottom:8px;">${p.symbol.replace('USDT','/USDT')}</div>
              <div class="position-grid">
                <div class="position-item"><div class="plabel">Entrada</div><div class="pvalue">$${p.entryPrice || '—'}</div></div>
              </div>
            </div>
          `).join('');
        }
      }

      const now = new Date().toLocaleTimeString('pt-PT');
      logs.unshift({ time: now, msg: `BTC $${data.price} | RSI ${data.rsi} | F&G ${data.fearGreed} | ${data.signal || 'WAIT'}` });
      if (logs.length > 50) logs.pop();
      document.getElementById('log-list').innerHTML = logs.map(l => `<li><span>${l.time}</span>${l.msg}</li>`).join('');
      document.getElementById('updated').textContent = 'Última actualização: ' + new Date().toLocaleString('pt-PT');
    });
  </script>

</body>
</html>
